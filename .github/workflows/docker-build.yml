name: Build Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout your code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx (faster builds, better caching)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Build the image
      #    - Does NOT push (just verifies the build succeeds)
      #    - Uses GitHub Actions cache to speed up repeat builds
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: shape_detection:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max